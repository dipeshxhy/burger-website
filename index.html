<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- remix icon -->
     <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
<!-- end remix icon -->

    <title>Burger House &mdash; Taste The Difference</title>
    <link rel="stylesheet" href="/src/style.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Rubik:300,regular,500,600,700,800,900"
      rel="stylesheet"
    />
  </head>
  <body class="relative overflow-x-hidden">
    <!-- NAV -->
    <div class="bg z-10 relative px-6 overflow-hidden">
      <div
        class="container max-w-7xl mx-auto grid grid-cols-1 grid-rows-4 md:grid-cols-4 md:grid-rows-8 items-center text-white  "
      >
        <!-- nav links -->
         <div class="hidden lg:flex  items-center justify-between self-start py-10">
            <a href="" class="text-lg font-medium uppercase hover:text-hover">Home</a>
            <a href="" class="text-lg font-medium uppercase hover:text-hover">Our Menus</a>
            <a href="" class="text-lg font-medium uppercase hover:text-hover">About</a>
         </div>

         <div class="md:w-120 w-full justify-self-center  col-span-2 self-start p-4">
          <img class="w-full " src="/logo-white.png" alt="Logo">
         </div>

         <div class="lg:flex hidden py-10 self-start items-center gap-6 justify-between col-start-4">
          <a href="" class="text-lg font-medium uppercase hover:text-hover">Order Online</a>
          <a href="" class="text-lg font-medium uppercase hover:text-hover">Find Us</a>
          <a href="" class="text-lg font-medium uppercase hover:text-hover">📱</a>
          <a href="" class="text-lg font-medium uppercase hover:text-hover">📦</a>
         </div>
         <!-- hamburger -->
          <div class="lg:hidden block "><i class="ri-menu-line text-[6vw] self-start absolute top-[2vh] right-2"></i></div>
          
          <div>

          </div>
         <!-- text -->
          <h1 class="text-[10vw] md:text-[5rem] text-center  absolute top-1/3 z-30 left-1/2 -translate-x-1/2 -translate-y-1/2 font-bold uppercase tracking-wide leading-[1.4] ">
              <span>Taste</span>
              <span >The</span> <br>
              <span class="">Difference</span>
            </h1>
          <div class="col-start-2 col-span-2   items-center h-full justify-items-center row-span-2  p-20">
           
            <!-- burger -->
           <div class="md:w-full w-[40vw] row-start-2  md:z-20 relative">
            <img class="md:w-full w-[80vw]  " src="/hero-burger.png" alt="Burger in hero page">
            <img class="absolute w-98 -bottom-20 -right-40 hidden md:inline-block" src="/tomato-sauce.png" alt="Tomato sauce in hero page">
            
           </div>
          </div>

          <!-- tomato -->
           <div class="md:w-[70%] left-0 md:left-0  md:row-start-3 w-[20vw] row-start-3  relative">
            <img src="/tomato.png" alt="Tomato in hero page">
           </div>
          
           <!-- hero-bottom text -->
            <div class="md:row-start-4 row-start-4   col-span-2 self-start"> 
              <h2 class="uppercase md:text-xl font-bold mb-2 text-lg">The beef burger</h2>
              <p class="uppercase md:text-sm leading-relaxed text-xs">Smoked brisket, tender ribs, smoked sausage, bacon & cheddar with lettuce, tomato, house BBQ & ranch.</p>
            </div>

            <div class="md:row-start-4 row-start-4 md:col-start-4 justify-self-center self-start">
              <h2 class="md:text-4xl text-2xl font-bold uppercase">Sauce</h2>
              <p class="font-cursive md:text-4xl text-2xl">Original</p>
            </div>
      </div>
      <div class=" absolute z-20 top-[70%] md:w-40 w-20  -translate-y-1/2 md:right-0 right-0  ">
        <img class="w-full" src="/onion.png" alt="Onion in hero page">
      </div>
    </div>
    <!--end  NAV -->

        <!-- side-menu -->
         <aside class="sm:fixed hidden sm:block z-20 h-42 top-1/2 right-0 -translate-y-1/2 bg-black p-4 rounded-l-lg">
          <menu class="space-y-4">
            <li>⚙️</li>
            <li>♥️</li>
            <li>📖</li>
            <li>📞</li>
          </menu>
         </aside>

         <main>
          <section class="bg-black h-[50vh]"></section>
         </main>
  </body>
</html>
