<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>burger-website</title>
    <link rel="stylesheet" href="src/style.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Rubik:300,regular,500,600,700,800,900"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Nav -->
    <div class="bg-red-600 text-white pb-20">
      <nav
        class="container mx-auto p-6 flex items-center space-x-4 justify-between"
      >
        <div class="flex gap-6 tracking-wide uppercase">
          <a href="" class="text-xl font-bold">Home</a>
          <a href="" class="text-xl font-bold">Our Menus</a>
          <a href="" class="text-xl font-bold">About</a>
        </div>
        <div class="w-1/5">
          <img
            src="https://grandrestaurantv6.b-cdn.net/grandrestaurantv6/demo9/wp-content/uploads/sites/9/2021/01/logo-white.png"
            alt="burger logo"
            class="w-full"
          />
        </div>
        <div class="flex gap-6 tracking-wide uppercase">
          <a href="" class="text-xl font-bold">Order Online</a>
          <a href="" class="text-xl font-bold">Find Us</a>
        </div>
      </nav>

      <!-- end Nav -->

      <!-- main -->
      <main>
        <!-- hero -->
        <div>
          <div class="flex items-center justify-center w-1/2 mx-auto">
            <h1
              class="text-8xl font-bold text-center mt-20 tracking-wide uppercase gap-4 space-x-10"
            >
              <span>Taste</span> <span>The</span> <span>Difference</span>
            </h1>
          </div>
          <div class="flex items-center px-20 space-x-6">
            <img
              src="https://grandrestaurantv6.b-cdn.net/grandrestaurantv6/demo9/wp-content/uploads/sites/9/2021/01/tomatos.png"
              alt=""
              class="w-1/6"
            />
            <div
              class="relative mx-auto w-1/2 flex items-center justify-center"
            >
              <img
                src="https://grandrestaurantv6.b-cdn.net/grandrestaurantv6/demo9/wp-content/uploads/sites/9/2021/01/beef_burgers_burger_and_sauce_768px-5.png"
                alt=""
                class="w-full"
              />
              <img
                src="https://grandrestaurantv6.b-cdn.net/grandrestaurantv6/demo9/wp-content/uploads/sites/9/2021/01/source.png"
                alt=""
                class="w-98 absolute -bottom-10 -right-10"
              />
            </div>
          </div>

          <div class="flex items-center justify-between px-10">
            <div class="w-1/3">
              <h2 class="text-3xl mb-4 font-bold uppercase">The beef burger</h2>
              <p class="uppercase text-lg">
                Smoked brisket, tender ribs, smoked sausage, bacon & cheddar
                with lettuce, tomato, house BBQ & ranch.
              </p>
            </div>
            <div>
              <h2 class="text-3xl font-bold">Sauce</h2>
              <div class="text-5xl font-extrabold">Original</div>
            </div>
          </div>
        </div>
        <!-- end hero -->
      </main>
      <!--end  main -->
    </div>
  </body>
</html>
